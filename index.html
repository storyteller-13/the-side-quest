<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Quest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0010;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameContainer {
    position: fixed;
    inset: 0;
  }
  canvas {
    display: block;
  }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px;
  }
  .hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }
  .hud-label { color: #ff69b4; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
  #healthBar {
    width: 180px; height: 16px;
    background: #1a0020;
    border: 1px solid #ff69b4;
    border-radius: 2px;
    overflow: hidden;
  }
  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #ff1493, #ff69b4);
    transition: width 0.15s;
  }
  #scoreDisplay {
    color: #ffd700;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 8px #ffd700;
  }
  #levelDisplay {
    color: #c084fc;
    font-size: 13px;
    letter-spacing: 1px;
  }
  #wantedStars {
    color: #ffd700;
    font-size: 16px;
    letter-spacing: 2px;
  }
  #minimap {
    position: absolute;
    bottom: 16px;
    right: 16px;
    border: 1px solid #ff69b4;
    background: rgba(0,0,0,0.6);
  }
  #ammoDisplay {
    color: #ff69b4;
    font-size: 13px;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    color: white;
  }
  #overlay h1 {
    font-size: 42px;
    color: #ff69b4;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  #overlay .subtitle {
    color: #c084fc;
    font-size: 15px;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }
  #overlay .controls {
    color: #aaa;
    font-size: 12px;
    line-height: 2;
    text-align: center;
    margin-bottom: 30px;
    border: 1px solid #333;
    padding: 16px 32px;
  }
  #overlay .controls span { color: #ff69b4; }
  #startBtn {
    background: linear-gradient(135deg, #ff1493, #c084fc);
    border: none;
    color: white;
    padding: 14px 48px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    pointer-events: all;
  }
  #startBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255, 20, 147, 0.8);
  }
  #message {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffd700;
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #ffd700;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <canvas id="minimap" width="120" height="80"></canvas>
  <div id="ui">
    <div id="hud">
      <div class="hud-left">
        <div class="hud-label">Health</div>
        <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
        <div class="hud-label" style="margin-top:4px">Ammo</div>
        <div id="ammoDisplay">HEARTS: 5</div>
      </div>
      <div class="hud-right">
        <div id="scoreDisplay">0</div>
        <div id="levelDisplay">ZONE 1 - THE DARK STREETS</div>
        <div id="wantedStars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
      </div>
    </div>
  </div>
  <div id="overlay">
    <h1>PRINCESS QUEST</h1>
    <div class="subtitle">Fight your way to the prince</div>
    <div class="controls">
      <span>WASD / Arrow Keys</span> — Move<br>
      <span>Space / Left Click</span> — Melee Attack<br>
      <span>E / Right Click</span> — Throw Heart (ranged)<br>
    </div>
    <button id="startBtn">START GAME</button>
  </div>
  <div id="message"></div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const TILE = 32;
const COLS = 50, ROWS = 35;

// Tile types
const T = { ROAD: 0, WALL: 1, GRASS: 2, PARK: 3, ROSE: 4, HEART_TILE: 5, CASTLE: 6 };

// ─── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const mctx = minimapCanvas.getContext('2d');

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Game State ──────────────────────────────────────────────────────────────
let state = 'menu'; // menu, playing, dead, win
let score = 0;
let zone = 0;
let frameCount = 0;
let showMessage = '';
let messageTimer = 0;

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: 0, y: 0, left: false, right: false };
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) mouse.left = true;
  if (e.button === 2) mouse.right = true;
  e.preventDefault();
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouse.left = false;
  if (e.button === 2) mouse.right = false;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─── Map Generation ──────────────────────────────────────────────────────────
const ZONES = [
  { name: 'ZONE 1 - THE DARK STREETS', bg: '#1a0028', monsterCount: 6, monsterSpeed: 1.2 },
  { name: 'ZONE 2 - HAUNTED GARDENS',  bg: '#001a0a', monsterCount: 10, monsterSpeed: 1.5 },
  { name: 'ZONE 3 - THE ROSE CASTLE',  bg: '#1a0010', monsterCount: 14, monsterSpeed: 1.8 },
];

let tilemap = [];
let monsters = [];
let projectiles = [];
let particles = [];
let roses = [];
let prince = null;
let player = null;
let camera = { x: 0, y: 0 };

function generateMap(zoneIdx) {
  tilemap = [];
  for (let r = 0; r < ROWS; r++) {
    tilemap[r] = [];
    for (let c = 0; c < COLS; c++) {
      tilemap[r][c] = T.WALL;
    }
  }

  // Carve roads (GTA-style grid)
  // Horizontal roads every 6-8 tiles
  const hRoads = [2, 8, 14, 20, 26, 32];
  const vRoads = [2, 9, 16, 23, 30, 37, 44];

  for (const row of hRoads) {
    for (let c = 0; c < COLS; c++) {
      tilemap[row][c] = T.ROAD;
      if (row + 1 < ROWS) tilemap[row + 1][c] = T.ROAD;
      if (row + 2 < ROWS) tilemap[row + 2][c] = T.ROAD;
    }
  }
  for (const col of vRoads) {
    for (let r = 0; r < ROWS; r++) {
      tilemap[r][col] = T.ROAD;
      if (col + 1 < COLS) tilemap[r][col + 1] = T.ROAD;
    }
  }

  // Fill some blocks with grass/park
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tilemap[r][c] === T.WALL) {
        const rand = Math.random();
        if (rand < 0.05) tilemap[r][c] = T.PARK;
        else if (rand < 0.08) tilemap[r][c] = T.ROSE;
        else tilemap[r][c] = T.WALL;
      }
    }
  }

  // Castle at the far end
  for (let r = 12; r < 22; r++) {
    for (let c = 42; c < 49; c++) {
      tilemap[r][c] = T.CASTLE;
    }
  }
  // Clear path to castle
  for (let c = 37; c < 49; c++) {
    tilemap[16][c] = T.ROAD;
    tilemap[17][c] = T.ROAD;
    tilemap[18][c] = T.ROAD;
  }
}

function isWalkable(wx, wy, radius = 10) {
  const checkPoints = [
    [wx - radius, wy - radius], [wx + radius, wy - radius],
    [wx - radius, wy + radius], [wx + radius, wy + radius],
  ];
  for (const [cx, cy] of checkPoints) {
    const col = Math.floor(cx / TILE);
    const row = Math.floor(cy / TILE);
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
    if (tilemap[row][col] === T.WALL) return false;
  }
  return true;
}

// ─── Entities ────────────────────────────────────────────────────────────────
function createPlayer() {
  return {
    x: 3 * TILE + TILE / 2,
    y: 9 * TILE + TILE / 2,
    vx: 0, vy: 0,
    speed: 2.8,
    hp: 100, maxHp: 100,
    ammo: 5,
    facing: 0, // angle in radians
    attackTimer: 0,
    attackCooldown: 20,
    heartCooldown: 0,
    chargeTime: 0,
    wasChargingHeart: false,
    ammoRegenTimer: 0,
    invincible: 0,
    dead: false,
  };
}

const MONSTER_TYPES = [
  { name: 'Goblin',   color: '#4ade80', eyeColor: '#ff0', hp: 30,  speed: 1.1, damage: 8,  size: 14, loot: 50  },
  { name: 'Wraith',   color: '#a78bfa', eyeColor: '#fff', hp: 50,  speed: 1.4, damage: 12, size: 16, loot: 80  },
  { name: 'Ogre',     color: '#f87171', eyeColor: '#ff0', hp: 100, speed: 0.7, damage: 20, size: 22, loot: 150 },
  { name: 'Bat',      color: '#94a3b8', eyeColor: '#f00', hp: 20,  speed: 2.0, damage: 6,  size: 10, loot: 30  },
  { name: 'Skeleton', color: '#e2e8f0', eyeColor: '#f00', hp: 40,  speed: 1.3, damage: 10, size: 15, loot: 60  },
];

function spawnMonsters(zoneIdx) {
  monsters = [];
  const count = ZONES[zoneIdx].monsterCount;
  const spd = ZONES[zoneIdx].monsterSpeed;
  const roadCells = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (tilemap[r][c] === T.ROAD && c > 5) roadCells.push([r, c]);
  }

  for (let i = 0; i < count; i++) {
    const typeIdx = Math.floor(Math.random() * Math.min(zoneIdx + 2, MONSTER_TYPES.length));
    const type = MONSTER_TYPES[typeIdx];
    const cell = roadCells[Math.floor(Math.random() * roadCells.length)];
    monsters.push({
      x: cell[1] * TILE + TILE / 2,
      y: cell[0] * TILE + TILE / 2,
      vx: 0, vy: 0,
      hp: type.hp * (1 + zoneIdx * 0.3),
      maxHp: type.hp * (1 + zoneIdx * 0.3),
      speed: type.speed * spd,
      damage: type.damage,
      size: type.size,
      color: type.color,
      eyeColor: type.eyeColor,
      loot: type.loot,
      name: type.name,
      state: 'patrol',
      patrolAngle: Math.random() * Math.PI * 2,
      patrolTimer: 0,
      attackTimer: 0,
      facing: 0,
      alertTimer: 0,
      dead: false,
    });
  }
}

function spawnPrince() {
  prince = {
    x: 45.5 * TILE,
    y: 17 * TILE,
    size: 18,
    bobTimer: 0,
    reached: false,
  };
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 6, speed = 3) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed * (0.5 + Math.random()),
      color,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 4 + Math.random() * 4,
    });
  }
}

function spawnHearts(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8;
    particles.push({
      x, y,
      vx: Math.cos(angle) * 3,
      vy: Math.sin(angle) * 3,
      color: '#ff69b4',
      life: 40, maxLife: 40,
      size: 8,
      heart: true,
    });
  }
}

// ─── Drawing Helpers ─────────────────────────────────────────────────────────
function drawHeart(ctx, x, y, size, color = '#ff1493', alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.25);
  ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size * 0.4);
  ctx.bezierCurveTo(x - size, y + size * 0.75, x, y + size, x, y + size);
  ctx.bezierCurveTo(x, y + size, x + size, y + size * 0.75, x + size, y + size * 0.4);
  ctx.bezierCurveTo(x + size, y, x, y, x, y + size * 0.25);
  ctx.fill();
  ctx.restore();
}

function worldToScreen(wx, wy) {
  return [wx - camera.x, wy - camera.y];
}

// ─── Tile Rendering ──────────────────────────────────────────────────────────
const tileColors = {
  [T.ROAD]:  ['#2d1b3d', '#251530'],
  [T.WALL]:  ['#1a0028', '#150020'],
  [T.GRASS]: ['#1a2e1a', '#162614'],
  [T.PARK]:  ['#0f2010', '#0c1a0c'],
  [T.ROSE]:  ['#2d0a1a', '#200812'],
  [T.CASTLE]:['#2a1a3a', '#1e1228'],
};

const roadLines = '#3d2855';
const sidewalkColor = '#251838';

function drawTile(r, c) {
  const t = tilemap[r][c];
  const [sx, sy] = worldToScreen(c * TILE, r * TILE);
  if (sx > W || sy > H || sx < -TILE || sy < -TILE) return;

  const colors = tileColors[t] || tileColors[T.WALL];
  const checker = (r + c) % 2;
  ctx.fillStyle = colors[checker];
  ctx.fillRect(sx, sy, TILE, TILE);

  if (t === T.ROAD) {
    // Road markings
    if (c % 9 === 4) {
      ctx.fillStyle = roadLines;
      ctx.fillRect(sx + TILE / 2 - 1, sy, 2, TILE);
    }
    if (r % 7 === 3) {
      ctx.fillStyle = roadLines;
      ctx.fillRect(sx, sy + TILE / 2 - 1, TILE, 2);
    }
  } else if (t === T.WALL) {
    // Building facade
    ctx.strokeStyle = '#2a1040';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
    // Occasional window glow
    if ((r * 7 + c * 13) % 17 === 0) {
      ctx.fillStyle = 'rgba(255, 200, 100, 0.15)';
      ctx.fillRect(sx + 8, sy + 6, 6, 8);
      ctx.fillRect(sx + 18, sy + 6, 6, 8);
    }
  } else if (t === T.ROSE) {
    ctx.fillStyle = '#ff1493';
    ctx.beginPath();
    ctx.arc(sx + TILE / 2, sy + TILE / 2, 5, 0, Math.PI * 2);
    ctx.fill();
    // Stem
    ctx.strokeStyle = '#2d5a1b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx + TILE / 2, sy + TILE / 2 + 5);
    ctx.lineTo(sx + TILE / 2, sy + TILE - 4);
    ctx.stroke();
  } else if (t === T.CASTLE) {
    ctx.strokeStyle = '#c084fc';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    // Castle wall pattern
    if (r % 2 === 0 && c % 2 === 0) {
      ctx.fillStyle = 'rgba(192, 132, 252, 0.1)';
      ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
    }
    // Crenellation at top of castle area
    if (r === 12 && c >= 42) {
      ctx.fillStyle = '#c084fc';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(sx + 2 + i * 10, sy, 6, 8);
      }
    }
  }
}

// ─── Entity Rendering ────────────────────────────────────────────────────────
function drawPlayer(p) {
  const [sx, sy] = worldToScreen(p.x, p.y);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(p.facing);

  // Invincibility flash
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Cape / dress (below body)
  ctx.fillStyle = '#c084fc';
  ctx.beginPath();
  ctx.moveTo(-8, 4);
  ctx.lineTo(8, 4);
  ctx.lineTo(10, 18);
  ctx.lineTo(-10, 18);
  ctx.closePath();
  ctx.fill();

  // Dress gradient
  ctx.fillStyle = '#e879f9';
  ctx.beginPath();
  ctx.moveTo(-6, 2);
  ctx.lineTo(6, 2);
  ctx.lineTo(9, 16);
  ctx.lineTo(-9, 16);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.fillStyle = '#fcd5ce';
  ctx.beginPath();
  ctx.ellipse(0, 0, 9, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Crown
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-7, -13, 14, 5);
  ctx.fillRect(-8, -13, 4, 9);
  ctx.fillRect(-1, -13, 4, 9);
  ctx.fillRect(5, -13, 4, 9);
  // Crown gem
  ctx.fillStyle = '#ff1493';
  ctx.beginPath();
  ctx.arc(0, -10, 3, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(0, -8, 9, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = '#fcd5ce';
  ctx.beginPath();
  ctx.arc(0, -4, 7, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.arc(-3, -5, 1.5, 0, Math.PI * 2);
  ctx.arc(3, -5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Blush
  ctx.fillStyle = 'rgba(255, 150, 150, 0.5)';
  ctx.beginPath();
  ctx.ellipse(-5, -3, 3, 2, 0, 0, Math.PI * 2);
  ctx.ellipse(5, -3, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Sword / wand
  if (p.attackTimer > p.attackCooldown - 8) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(8, -2);
    ctx.lineTo(28, -10);
    ctx.stroke();
    ctx.fillStyle = '#ff1493';
    ctx.beginPath();
    ctx.arc(28, -10, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(20, -6);
    ctx.stroke();
  }

  ctx.restore();

  // Glow aura
  const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 28);
  grd.addColorStop(0, 'rgba(255, 105, 180, 0.12)');
  grd.addColorStop(1, 'rgba(255, 105, 180, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(sx, sy, 28, 0, Math.PI * 2);
  ctx.fill();
}

function drawMonster(m) {
  const [sx, sy] = worldToScreen(m.x, m.y);
  if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) return;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(m.facing);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, m.size + 2, m.size * 0.8, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = m.color;
  ctx.beginPath();
  ctx.arc(0, 0, m.size, 0, Math.PI * 2);
  ctx.fill();

  // Texture
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(-m.size * 0.3, -m.size * 0.2, m.size * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = m.eyeColor;
  ctx.beginPath();
  ctx.arc(-m.size * 0.35, -m.size * 0.2, m.size * 0.2, 0, Math.PI * 2);
  ctx.arc(m.size * 0.35, -m.size * 0.2, m.size * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-m.size * 0.35, -m.size * 0.2, m.size * 0.08, 0, Math.PI * 2);
  ctx.arc(m.size * 0.35, -m.size * 0.2, m.size * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Mouth - angry when alerted
  ctx.strokeStyle = m.alertTimer > 0 ? '#ff0000' : '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (m.alertTimer > 0) {
    ctx.moveTo(-m.size * 0.4, m.size * 0.3);
    ctx.lineTo(m.size * 0.4, m.size * 0.3);
  } else {
    ctx.arc(0, m.size * 0.1, m.size * 0.3, 0.1, Math.PI - 0.1);
  }
  ctx.stroke();

  ctx.restore();

  // HP bar
  if (m.hp < m.maxHp) {
    const bw = m.size * 2.5;
    const bh = 4;
    const bx = sx - bw / 2;
    const by = sy - m.size - 10;
    ctx.fillStyle = '#1a0020';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#ff1493';
    ctx.fillRect(bx, by, bw * (m.hp / m.maxHp), bh);
  }

  // Alert icon
  if (m.alertTimer > 30) {
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('!', sx, sy - m.size - 14);
  }
}

function drawPrince(p) {
  if (!p) return;
  const [sx, sy] = worldToScreen(p.x, p.y);
  if (sx < -60 || sx > W + 60 || sy < -60 || sy > H + 60) return;

  p.bobTimer++;
  const bob = Math.sin(p.bobTimer * 0.05) * 3;

  ctx.save();
  ctx.translate(sx, sy + bob);

  // Glow
  const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
  grd.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
  grd.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, 40, 0, Math.PI * 2);
  ctx.fill();

  // Cape
  ctx.fillStyle = '#1e40af';
  ctx.beginPath();
  ctx.moveTo(-10, 5);
  ctx.lineTo(10, 5);
  ctx.lineTo(14, 22);
  ctx.lineTo(-14, 22);
  ctx.closePath();
  ctx.fill();

  // Body / armor
  ctx.fillStyle = '#c084fc';
  ctx.beginPath();
  ctx.ellipse(0, 0, 11, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(0, -10, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = '#fcd5ce';
  ctx.beginPath();
  ctx.arc(0, -6, 8, 0, Math.PI * 2);
  ctx.fill();

  // Crown
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-8, -17, 16, 5);
  ctx.fillRect(-9, -17, 4, 9);
  ctx.fillRect(-1, -17, 4, 9);
  ctx.fillRect(6, -17, 4, 9);
  ctx.fillStyle = '#c084fc';
  ctx.beginPath();
  ctx.arc(0, -14, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.arc(-3, -7, 1.5, 0, Math.PI * 2);
  ctx.arc(3, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#be185d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -4, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Rose he's holding
  ctx.fillStyle = '#ff1493';
  ctx.beginPath();
  ctx.arc(16, 2, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2d5a1b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(16, 7);
  ctx.lineTo(16, 22);
  ctx.stroke();

  ctx.restore();

  // Floating hearts
  for (let i = 0; i < 3; i++) {
    const t = (frameCount * 0.02 + i * 2.1) % (Math.PI * 2);
    const hx = sx + Math.cos(t + i * 2) * 35;
    const hy = sy - 30 + Math.sin(t * 0.7) * 15 - i * 12;
    drawHeart(ctx, hx, hy, 5, '#ff69b4', 0.6 + Math.sin(t) * 0.3);
  }

  // "REACH ME!" indicator
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 8;
  ctx.fillText('REACH ME!', sx, sy - p.size - 50);
  ctx.shadowBlur = 0;
}

function drawProjectile(proj) {
  const [sx, sy] = worldToScreen(proj.x, proj.y);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(proj.angle);
  if (proj.type === 'heart') {
    drawHeart(ctx, 0, 0, 8, '#ff1493', 1);
    ctx.shadowColor = '#ff1493';
    ctx.shadowBlur = 12;
    drawHeart(ctx, 0, 0, 8, '#ff69b4', 0.5);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawParticle(p) {
  const [sx, sy] = worldToScreen(p.x, p.y);
  const alpha = p.life / p.maxLife;
  ctx.globalAlpha = alpha;
  if (p.heart) {
    drawHeart(ctx, sx, sy, p.size * alpha, p.color, 1);
  } else {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Game Logic ──────────────────────────────────────────────────────────────
function updatePlayer(p) {
  if (p.dead) return;

  // Facing direction towards mouse or movement direction
  const [mx, my] = [mouse.x - W / 2 + camera.x, mouse.y - H / 2 + camera.y];
  p.facing = Math.atan2(my - p.y, mx - p.x) + Math.PI / 2;

  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) dy += 1;

  const spd = p.speed;

  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = (dx / len) * spd;
    const ny = (dy / len) * spd;

    if (isWalkable(p.x + nx, p.y, 10)) p.x += nx;
    if (isWalkable(p.x, p.y + ny, 10)) p.y += ny;
  }

  // Timers
  if (p.attackTimer > 0) p.attackTimer--;
  if (p.invincible > 0) p.invincible--;

  // Attack - melee
  if ((keys['Space'] || mouse.left) && p.attackTimer === 0) {
    p.attackTimer = p.attackCooldown;
    doMeleeAttack(p);
    keys['Space'] = false;
  }

  // Attack - ranged (heart projectile)
  if ((keys['KeyE'] || mouse.right) && p.attackTimer === 0 && p.ammo > 0) {
    p.attackTimer = p.attackCooldown;
    p.ammo--;
    mouse.right = false;
    keys['KeyE'] = false;
    const angle = p.facing - Math.PI / 2;
    projectiles.push({
      x: p.x, y: p.y,
      vx: Math.cos(angle) * 7,
      vy: Math.sin(angle) * 7,
      angle: angle,
      type: 'heart',
      owner: 'player',
      damage: 35,
      life: 80,
    });
    spawnParticles(p.x, p.y, '#ff69b4', 4, 2);
  }
}

function doMeleeAttack(p) {
  const range = 50;
  const angle = p.facing - Math.PI / 2;
  const ax = p.x + Math.cos(angle) * 25;
  const ay = p.y + Math.sin(angle) * 25;

  let hit = false;
  for (const m of monsters) {
    if (m.dead) continue;
    const dx = m.x - ax, dy = m.y - ay;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < range) {
      damageMonster(m, 40 + Math.random() * 20);
      hit = true;
    }
  }

  if (hit) {
    spawnParticles(ax, ay, '#ffd700', 8, 5);
  }

  // Hit sparkle regardless
  spawnParticles(ax, ay, '#ff69b4', 5, 3);
}

function damageMonster(m, dmg) {
  m.hp -= dmg;
  spawnParticles(m.x, m.y, m.color, 5, 4);
  if (m.hp <= 0 && !m.dead) {
    m.dead = true;
    score += m.loot;
    // Drop ammo sometimes
    if (Math.random() < 0.3) {
      player.ammo = Math.min(player.ammo + 1, 10);
      showFloatingText(m.x, m.y, '+HEART', '#ff69b4');
    }
    spawnHearts(m.x, m.y);
    spawnParticles(m.x, m.y, m.color, 15, 6);
    roses.push({ x: m.x, y: m.y, life: 180 });
  }
}

const floatingTexts = [];
function showFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60, maxLife: 60 });
}

function updateMonster(m) {
  if (m.dead) return;

  const dx = player.x - m.x;
  const dy = player.y - m.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  m.facing = Math.atan2(dy, dx) + Math.PI / 2;

  if (dist < 280) {
    m.alertTimer = 90;
    m.state = 'chase';
  } else if (m.alertTimer <= 0) {
    m.state = 'patrol';
  }
  if (m.alertTimer > 0) m.alertTimer--;

  if (m.state === 'chase') {
    const nx = (dx / dist) * m.speed;
    const ny = (dy / dist) * m.speed;
    if (isWalkable(m.x + nx, m.y, m.size - 2)) m.x += nx;
    if (isWalkable(m.x, m.y + ny, m.size - 2)) m.y += ny;

    // Melee attack player
    if (dist < 30) {
      if (m.attackTimer === 0) {
        m.attackTimer = 45;
        if (player.invincible === 0) {
          player.hp -= m.damage;
          player.invincible = 30;
          spawnParticles(player.x, player.y, '#ff0000', 6, 4);
          if (player.hp <= 0) {
            player.dead = true;
            state = 'dead';
          }
        }
      }
    }
  } else {
    // Patrol
    m.patrolTimer++;
    if (m.patrolTimer > 80) {
      m.patrolAngle += (Math.random() - 0.5) * Math.PI;
      m.patrolTimer = 0;
    }
    const nx = Math.cos(m.patrolAngle) * m.speed * 0.5;
    const ny = Math.sin(m.patrolAngle) * m.speed * 0.5;
    if (!isWalkable(m.x + nx, m.y, m.size - 2)) m.patrolAngle += Math.PI * 0.5;
    else m.x += nx;
    if (!isWalkable(m.x, m.y + ny, m.size - 2)) m.patrolAngle += Math.PI * 0.5;
    else m.y += ny;
  }

  if (m.attackTimer > 0) m.attackTimer--;
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    if (p.life <= 0 || !isWalkable(p.x, p.y, 4)) {
      spawnParticles(p.x, p.y, '#ff69b4', 5, 3);
      projectiles.splice(i, 1);
      continue;
    }

    if (p.owner === 'player') {
      for (const m of monsters) {
        if (m.dead) continue;
        const dx = m.x - p.x, dy = m.y - p.y;
        if (Math.sqrt(dx * dx + dy * dy) < m.size + 8) {
          damageMonster(m, p.damage);
          projectiles.splice(i, 1);
          break;
        }
      }
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 0.5;
    ft.life--;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function updateCamera() {
  const targetX = player.x - W / 2;
  const targetY = player.y - H / 2;
  camera.x += (targetX - camera.x) * 0.12;
  camera.y += (targetY - camera.y) * 0.12;
  camera.x = Math.max(0, Math.min(COLS * TILE - W, camera.x));
  camera.y = Math.max(0, Math.min(ROWS * TILE - H, camera.y));
}

function checkWin() {
  if (!prince || player.dead) return;
  const dx = player.x - prince.x;
  const dy = player.y - prince.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 60) {
    state = 'win';
    spawnHearts(prince.x, prince.y);
    spawnHearts(player.x, player.y);
  }
}

// ─── Minimap ─────────────────────────────────────────────────────────────────
function drawMinimap() {
  const mw = minimapCanvas.width, mh = minimapCanvas.height;
  const scaleX = mw / (COLS * TILE);
  const scaleY = mh / (ROWS * TILE);

  mctx.fillStyle = '#0a0010';
  mctx.fillRect(0, 0, mw, mh);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = tilemap[r][c];
      if (t === T.ROAD) mctx.fillStyle = '#2d1b3d';
      else if (t === T.CASTLE) mctx.fillStyle = '#c084fc';
      else mctx.fillStyle = '#150020';
      mctx.fillRect(c * scaleX * TILE, r * scaleY * TILE, scaleX * TILE + 1, scaleY * TILE + 1);
    }
  }

  // Prince
  if (prince) {
    mctx.fillStyle = '#ffd700';
    mctx.beginPath();
    mctx.arc(prince.x * scaleX, prince.y * scaleY, 3, 0, Math.PI * 2);
    mctx.fill();
  }

  // Monsters
  mctx.fillStyle = '#ff4444';
  for (const m of monsters) {
    if (!m.dead) {
      mctx.beginPath();
      mctx.arc(m.x * scaleX, m.y * scaleY, 2, 0, Math.PI * 2);
      mctx.fill();
    }
  }

  // Player
  mctx.fillStyle = '#ff69b4';
  mctx.beginPath();
  mctx.arc(player.x * scaleX, player.y * scaleY, 3, 0, Math.PI * 2);
  mctx.fill();

  // Camera rectangle
  mctx.strokeStyle = 'rgba(255,255,255,0.3)';
  mctx.lineWidth = 0.5;
  mctx.strokeRect(camera.x * scaleX, camera.y * scaleY, W * scaleX, H * scaleY);
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('healthFill').style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
  document.getElementById('scoreDisplay').textContent = score.toString().padStart(6, '0');
  document.getElementById('ammoDisplay').textContent = 'HEARTS: ' + player.ammo;
  document.getElementById('levelDisplay').textContent = ZONES[zone].name;

  // Wanted stars based on monsters killed
  const aliveMonsters = monsters.filter(m => !m.dead).length;
  const totalMonsters = monsters.length;
  const killed = totalMonsters - aliveMonsters;
  const pct = killed / totalMonsters;
  const stars = Math.floor(pct * 5) + 1;
  document.getElementById('wantedStars').textContent = '♥'.repeat(Math.min(stars, 5));
}

// ─── Main Render ─────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = ZONES[zone].bg;
  ctx.fillRect(0, 0, W, H);

  // Tiles
  const startCol = Math.floor(camera.x / TILE);
  const endCol = Math.min(COLS, startCol + Math.ceil(W / TILE) + 2);
  const startRow = Math.floor(camera.y / TILE);
  const endRow = Math.min(ROWS, startRow + Math.ceil(H / TILE) + 2);

  for (let r = startRow; r < endRow; r++) {
    for (let c = startCol; c < endCol; c++) {
      drawTile(r, c);
    }
  }

  // Rose drops
  for (const rose of roses) {
    const [sx, sy] = worldToScreen(rose.x, rose.y);
    ctx.fillStyle = '#ff1493';
    ctx.globalAlpha = rose.life / 180;
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Entities
  drawPrince(prince);
  for (const m of monsters) drawMonster(m);
  drawPlayer(player);

  // Projectiles
  for (const proj of projectiles) drawProjectile(proj);

  // Particles
  for (const p of particles) drawParticle(p);

  // Floating texts
  for (const ft of floatingTexts) {
    const [sx, sy] = worldToScreen(ft.x, ft.y);
    ctx.globalAlpha = ft.life / ft.maxLife;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, sx, sy);
    ctx.globalAlpha = 1;
  }

  // GTA-style screen vignette
  const vgrd = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.8);
  vgrd.addColorStop(0, 'rgba(0,0,0,0)');
  vgrd.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vgrd;
  ctx.fillRect(0, 0, W, H);

  // Death / low health tint
  if (player.hp < 30) {
    const pulse = (Math.sin(frameCount * 0.08) + 1) / 2;
    ctx.fillStyle = `rgba(255, 0, 0, ${0.05 + pulse * 0.1})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Message overlay
  if (messageTimer > 0) {
    messageTimer--;
    const alpha = Math.min(1, messageTimer / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 12;
    ctx.fillText(showMessage, W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawOverlay(title, sub, btnText, btnId) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>${title}</h1>
    <div class="subtitle">${sub}</div>
    <div style="color:#c084fc;font-size:14px;margin-bottom:24px;">Score: ${score.toString().padStart(6,'0')}</div>
    <button id="${btnId}" class="startBtn" style="background:linear-gradient(135deg,#ff1493,#c084fc);border:none;color:white;padding:14px 48px;font-size:18px;font-family:'Courier New',monospace;letter-spacing:3px;cursor:pointer;text-transform:uppercase;border-radius:2px;box-shadow:0 0 20px rgba(255,20,147,0.5);">${btnText}</button>
  `;
  ov.style.display = 'flex';
}

// ─── Game Loop ───────────────────────────────────────────────────────────────
function initZone(zoneIdx) {
  generateMap(zoneIdx);
  player = createPlayer();
  projectiles = [];
  particles = [];
  roses = [];
  floatingTexts.length = 0;
  camera = { x: 0, y: 0 };
  spawnMonsters(zoneIdx);
  spawnPrince();
}

function startGame() {
  score = 0;
  zone = 0;
  initZone(zone);
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
}

let lastWinCheck = false;

function gameLoop() {
  requestAnimationFrame(gameLoop);
  frameCount++;

  if (state === 'playing') {
    updatePlayer(player);
    for (const m of monsters) updateMonster(m);
    updateProjectiles();
    updateParticles();
    updateFloatingTexts();
    updateCamera();
    checkWin();

    // Update rose drops
    for (let i = roses.length - 1; i >= 0; i--) {
      roses[i].life--;
      if (roses[i].life <= 0) roses.splice(i, 1);
    }

    render();
    updateHUD();
    drawMinimap();

  } else if (state === 'dead') {
    render(); // one last frame
    drawOverlay('YOU FELL', 'The prince waits... try again', 'RETRY', 'retryBtn');
    document.getElementById('retryBtn').addEventListener('click', startGame);
    state = 'deadScreen';

  } else if (state === 'win') {
    spawnHearts(player.x, player.y);
    spawnParticles(player.x, player.y, '#ffd700', 12, 6);
    updateParticles();
    updateCamera();
    render();
    drawOverlay('TRUE LOVE!', 'The princess and prince are reunited!', 'PLAY AGAIN', 'winBtn');
    document.getElementById('winBtn').addEventListener('click', startGame);
    state = 'winScreen';
  } else {
    // menu/deadScreen/winScreen — still render BG
    if (state !== 'menu') {
      render();
    }
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);
gameLoop();
</script>
